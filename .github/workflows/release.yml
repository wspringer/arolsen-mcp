name: Release to npm

# Triggered when the Knope Bot's release PR (always from branch
# `knope/release`) is merged into main. The bot has already updated
# package.json + CHANGELOG.md and created the tag + GitHub release; this
# workflow just publishes the package to npm with provenance.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  id-token: write # npm provenance via OIDC

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.head_ref == 'knope/release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
